services:
  - type: web
    name: promptv-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn main:app
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --forwarded-allow-ips="*"
      --proxy-allow-from="*"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
        # Ensure sslmode=require is appended to the Neon connection string
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_TEXT_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_VISION_MODEL
        value: gemini-2.5-flash

  - type: web
    name: promptv-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
